name: Daily snapshot

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pandas pyarrow

      - run: python collector.py

      - run: python enrich.py

      - run: python cluster.py

      - run: python propagate.py

      - name: Post Discord alert (if configured)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python alert.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots data/enriched data/clusters.json data/labels_resolved.json
          if git diff --cached --quiet; then
            echo "No new snapshot to commit."
          else
            git commit -m "chore: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
